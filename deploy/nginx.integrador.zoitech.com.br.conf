server {
  listen 443 ssl http2;
  server_name integrador.zoitech.com.br;

  ssl_certificate /etc/letsencrypt/live/integrador.zoitech.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/integrador.zoitech.com.br/privkey.pem;

  location /meli/ {
    proxy_pass http://127.0.0.1:7254/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
